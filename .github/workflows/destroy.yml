name: Terraform DestroyResources

on:
  workflow_dispatch:  

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ~/Task 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
