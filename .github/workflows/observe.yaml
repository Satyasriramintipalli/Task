name: Observability-pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - observability-pipeline

jobs:
  observability:
    runs-on: self-hosted

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: app-eks-cluster

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- INSTALL TOOLS ----------------
      - name: Ensure kubectl + helm
        run: |
          sudo apt update
          sudo apt install -y curl

          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

          if ! command -v helm &> /dev/null; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

      # ---------------- CONNECT TO EKS ----------------
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      # ================= MONITORING =================
      - name: Install Prometheus + Grafana
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            -n monitoring \
            --set grafana.service.type=LoadBalancer \
            --wait --timeout 10m

      # ================= LOGGING =================
      - name: Install Fluent Bit
        run: |
          kubectl create namespace logging --dry-run=client -o yaml | kubectl apply -f -

          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo update

          helm upgrade --install fluent-bit fluent/fluent-bit \
            -n logging \
            --wait --timeout 5m

      # ================= OBSERVABILITY =================
      - name: Install OpenTelemetry (CLEAN METHOD)
        run: |
          # Clean old releases (important)
          helm uninstall otel-collector -n observability || true
          kubectl delete namespace observability --ignore-not-found
          kubectl create namespace observability

          # Create clean config file
          cat <<EOF > otel-values.yaml
          mode: deployment

          image:
            repository: otel/opentelemetry-collector
            tag: 0.102.0

          config:
            receivers:
              otlp:
                protocols:
                  grpc:
                  http:

            processors:
              batch:

            exporters:
              logging:
                verbosity: detailed

            service:
              pipelines:
                traces:
                  receivers: [otlp]
                  processors: [batch]
                  exporters: [logging]
          EOF

          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

          helm install otel-collector open-telemetry/opentelemetry-collector \
            -n observability \
            -f otel-values.yaml \
            --wait --timeout 5m

      # ================= VERIFY =================
      - name: Verify
        run: |
          echo "===== Monitoring ====="
          kubectl get pods -n monitoring

          echo "===== Logging ====="
          kubectl get pods -n logging

          echo "===== Observability ====="
          kubectl get pods -n observability
