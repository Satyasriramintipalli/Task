name: Observability-pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - observability-pipeline

jobs:
  observability:
    runs-on: self-hosted

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: app-eks-cluster

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- INSTALL TOOLS ----------------
      - name: Ensure kubectl + helm
        run: |
          sudo apt update
          sudo apt install -y curl

          # kubectl
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

          # helm
          if ! command -v helm &> /dev/null; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

      # ---------------- CONNECT TO EKS ----------------
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      # ================= MONITORING =================
      - name: Install Prometheus + Grafana
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            -n monitoring \
            --set grafana.service.type=LoadBalancer \
            --set prometheus.prometheusSpec.resources.requests.memory=256Mi \
            --set prometheus.prometheusSpec.resources.limits.memory=512Mi \
            --set grafana.resources.requests.memory=128Mi \
            --set grafana.resources.limits.memory=256Mi \
            --wait --timeout 10m

      # ================= LOGGING =================
      - name: Install Fluent Bit
        run: |
          kubectl create namespace logging --dry-run=client -o yaml | kubectl apply -f -

          helm repo add fluent https://fluent.github.io/helm-charts
          helm repo update

          helm upgrade --install fluent-bit fluent/fluent-bit \
            -n logging \
            --set backend.type=stdout \
            --set resources.requests.memory=64Mi \
            --set resources.limits.memory=128Mi \
            --wait --timeout 5m

      # ================= OBSERVABILITY =================
      - name: Install OpenTelemetry Collector (FIXED)
        run: |
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -

          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

          helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
            -n observability \
            --set mode=deployment \
            --set image.repository=otel/opentelemetry-collector \
            --set image.tag=0.102.0 \
            --set config.receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317 \
            --set config.receivers.otlp.protocols.http.endpoint=0.0.0.0:4318 \
            --set config.exporters.logging.loglevel=debug \
            --set config.service.pipelines.traces.receivers[0]=otlp \
            --set config.service.pipelines.traces.exporters[0]=logging \
            --set resources.requests.memory=64Mi \
            --set resources.limits.memory=128Mi \
            --wait --timeout 10m

      # ================= VERIFY =================
      - name: Verify
        run: |
          echo "===== Monitoring ====="
          kubectl get pods -n monitoring

          echo "===== Logging ====="
          kubectl get pods -n logging

          echo "===== Observability ====="
          kubectl get pods -n observability

          echo "===== Services ====="
          kubectl get svc -n monitoring
