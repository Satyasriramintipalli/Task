name: Deployment-pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted  

    env:
      AWS_REGION: us-east-1
      ACCOUNT_ID: 393060838804
      ECR_REPO: crud-app
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # LINT (Node.js)
      # ---------------------------
      - name: Lint check
        run: |
          cd app
          npm install
          npx eslint . || true

      # ---------------------------
      # SONAR CLOUD
      # ---------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        continue-on-error: true
        with:
          args: >
            -Dsonar.projectKey=Satyasriramintipalli_Task
            -Dsonar.organization=satyasriramintipalli
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ---------------------------
      # INSTALL TOOLS
      # ---------------------------
      - name: Ensure tools
        run: |
          sudo apt update
          sudo apt install -y curl unzip

          # AWS CLI
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -o awscliv2.zip
            sudo ./aws/install
          fi

          # kubectl
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

          # helm
          if ! command -v helm &> /dev/null; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          # trivy (correct dynamic install)
          if ! command -v trivy &> /dev/null; then
            echo "Installing Trivy..."
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release

            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list

            sudo apt-get update
            sudo apt-get install -y trivy
          else
            echo "Trivy already installed"
          fi

      # ---------------------------
      # BUILD IMAGE
      # ---------------------------
      - name: Build Docker image
        run: |
          cd app
          docker build -t $ECR_REPO:$IMAGE_TAG .

      # ---------------------------
      # LOGIN ECR
      # ---------------------------
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # ---------------------------
      # TAG IMAGE
      # ---------------------------
      - name: Tag image
        run: |
          docker tag $ECR_REPO:$IMAGE_TAG \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

      # ---------------------------
      # PUSH IMAGE
      # ---------------------------
      - name: Push image
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

      # ---------------------------
      # TRIVY SCAN
      # ---------------------------
      - name: Scan image (Trivy)
        run: |
          trivy image --severity HIGH,CRITICAL \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

      # ---------------------------
      # CONNECT TO EKS
      # ---------------------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name app-eks-cluster

      # ---------------------------
      # DEPLOY
      # ---------------------------
      - name: Deploy using Helm
        run: |
          helm upgrade --install crud-app ./crud-app \
            --set image.repository=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO \
            --set image.tag=$IMAGE_TAG

      # ---------------------------
      # SMOKE TEST
      # ---------------------------
      - name: Smoke Test
        run: |
          sleep 60
          kubectl get pods
          kubectl get svc
