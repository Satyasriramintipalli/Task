name: Terraform CreateResource

on:
  workflow-dispatch:

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ~/Task 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
